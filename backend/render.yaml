services:
  - type: web
    name: nu-events-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e "."
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nu-events-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "https://nu-events.vercel.app,http://localhost:3001"

databases:
  - name: nu-events-db
    plan: free
    databaseName: nu_events
